var PW = '2026albania';
var pwVisible = false;

function checkPw(){
  var input = document.getElementById('pw-input');
  var error = document.getElementById('pw-error');
  if(input.value === PW){
    // Save to sessionStorage so refresh doesn't re-ask
    try{ sessionStorage.setItem('al26auth','1'); }catch(e){}
    var screen = document.getElementById('pw-screen');
    screen.style.transition='opacity 0.4s';
    screen.style.opacity='0';
    setTimeout(function(){ screen.style.display='none'; },400);
  } else {
    error.textContent = 'Falsches Passwort -- bitte nochmal versuchen';
    input.classList.add('error');
    input.value='';
    setTimeout(function(){ input.classList.remove('error'); },400);
    input.focus();
  }
}

function togglePwVis(){
  var input=document.getElementById('pw-input');
  var btn=document.getElementById('pw-toggle');
  pwVisible=!pwVisible;
  input.type=pwVisible?'text':'password';
  btn.textContent=pwVisible?'🙈':'👁';
}

// Check if already authenticated this session
(function(){
  try{
    if(sessionStorage.getItem('al26auth')==='1'){
      document.getElementById('pw-screen').style.display='none';
    } else {
      // Focus input on load
      setTimeout(function(){ document.getElementById('pw-input').focus(); },300);
    }
  }catch(e){}
})();

function renderMarkets(){

    '🤝 Preise sind oft verhandelbar, außer im renovierten Pazari i Ri Tirana<br>'+
    '🍅 Im Juni gibt es Tomaten, Paprika, Wassermelonen, Feigen, frischen Käse & Olivenöl in bester Qualität'+
    '</div></div>';

  MARKETS.forEach(function(city){
    h += '<div style="margin-bottom:18px;">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">'+
        '<span style="font-size:20px;">'+city.emoji+'</span>'+
        '<div>'+
          '<div style="font-size:16px;color:#f0e6d0;">'+city.city+'</div>'+
          '<div style="font-size:10px;color:var(--gold);">'+city.dates+'</div>'+
        '</div>'+
      '</div>';

    city.items.forEach(function(m){
      h += '<div class="card" style="margin-bottom:9px;padding:14px;">'+
        // Header row
        '<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;">'+
          '<span style="font-size:22px;flex-shrink:0;">'+m.icon+'</span>'+
          '<div style="flex:1;">'+
            '<div style="font-size:14px;color:#f0e6d0;font-weight:400;">'+m.name+'</div>'+
            '<div style="font-size:10px;color:var(--gold);margin-top:2px;">'+m.type+'</div>'+
          '</div>'+
        '</div>'+
        // Details grid
        '<div style="display:flex;flex-direction:column;gap:7px;">'+
          '<div style="display:flex;gap:8px;align-items:flex-start;">'+
            '<span style="font-size:11px;color:#6BAF8C;flex-shrink:0;min-width:16px;">🕐</span>'+
            '<span style="font-size:11px;color:#a0c8b0;">'+m.hours+'</span>'+
          '</div>'+
          '<div style="display:flex;gap:8px;align-items:flex-start;">'+
            '<span style="font-size:11px;flex-shrink:0;min-width:16px;">🛍</span>'+
            '<span style="font-size:11px;color:#b0a090;">'+m.offer+'</span>'+
          '</div>'+
          '<div style="display:flex;gap:8px;align-items:flex-start;">'+
            '<span style="font-size:11px;flex-shrink:0;min-width:16px;">📍</span>'+

var PT_DESC = {
  p1:  'Albaniens lebendige Hauptstadt -- osmanische Moscheen neben sozialistischen Betonriesen neben hippen Cafés. Bunk\'Art in einem echten Atomschutzbunker und der Skanderbeg-Platz sind Pflicht. Abends das Blloku-Viertel erkunden.',
  p2:  'Stützpunkt für Berat -- das "Weiße Städtchen" mit 2.400 Jahre alten Mauern ist UNESCO-Welterbe. Tagesausflug in den Osum Canyon: teils waten, teils schwimmen durch türkisblaues Wasser.',
  p3:  'Die "Stadt der 1000 Treppen" thront auf einem Bergrücken. Osmanische Steinhäuser mit Schieferdächern, eine mächtige Burg mit Cold-War-Bunker darunter, und abends gehört die Altstadt euch allein.',
  p4:  'Herz der albanischen Riviera. Unberührte Buchten, kristallklares Ionisches Meer, kleine Fischtavernen direkt am Wasser. Basis für Strandhopping und die spektakuläre Burg über der Stadt.',
  p5:  'Lebhafteste Küstenstadt des Südens. Sprungbrett für Ksamil-Inseln, Butrint und -- mit der Fähre -- sogar Korfu. Die Strandpromenade lädt abends zum typisch albanischen Xhiro-Spaziergang ein.',

  p7:  'UNESCO-Doppelwelterbe: sowohl Berat als auch Gjirokastër. Die Burg thront über der Stadt, das Ethnografische Museum gilt als eines der schönsten auf dem Balkan. Highlight: Osum Canyon direkt nebenan.',
  p8:  'Der dramatischste Punkt der Reise: Serpentinen auf 1.000m, Abgründe links, Felsnadeln rechts. Oben gibt es eine Passhöhe mit atemberaubendem Blick auf beide Küsten -- unbedingt anhalten und fotografieren.',
  p9:  'Vier kleine Inseln im türkisfarbenen Ionischen Meer, nur per Boot erreichbar. Das Wasser ist so klar, dass man den Grund in 5m Tiefe sieht. Im Juni noch halbwegs ruhig -- morgens früh kommen.',
  p10: 'Antike Ruinenstadt auf einer Halbinsel zwischen Lagune und Meer. Griechische Stadtmauern, römische Thermen, venezianische Türme -- 2.500 Jahre Geschichte auf kleinstem Raum. Früh morgens besuchen.',
  p11: 'Langer, breiter Strand mit türkisblauem Wasser und einer byzantinischen Kirche im Olivenhain darüber. 15 Minuten nördlich von Himara, einer der schönsten Strände der gesamten Riviera.',
  p12: 'Albaniens Unabhängigkeitsstadt. Flagge zuerst gehisst 1912. Schöner Rundturm am Hafen, entspannte Café-Promenade. Idealer Mittags-Zwischenstopp auf der Rückfahrt nach Tirana.',
  p13: 'Die dreieckige Festung von Ali Pascha auf einer felsigen Halbinsel -- direkt von der Küstenstraße sichtbar. Perfekter Fotostopp, kaum Touristen, freier Eintritt. Dahinter liegt eine ruhige Bucht zum Schwimmen.',
};

function mapClick(id){
  mapActiveId = mapActiveId===id ? null : id;
  var ol=document.getElementById('map-overlay');
  var ln=document.getElementById('map-leader');
  var infoBox=document.getElementById('map-infobox');
  if(!ol||!ln) return;

  // Highlight active panel row
  ALL_POINTS.forEach(function(pt){
    var bg=document.getElementById('mplbg-'+pt.id);
    if(bg) bg.setAttribute('fill', mapActiveId===pt.id ? 'rgba(200,169,110,0.18)' : 'transparent');
  });

  // Hide info box and line if deselecting
  if(!mapActiveId){
    ol.setAttribute('opacity','0');
    ln.setAttribute('d','');
    if(infoBox) infoBox.style.display='none';
    return;
  }

  var pt=ALL_POINTS.filter(function(p){return p.id===mapActiveId;})[0];
  if(!pt) return;

  // Draw leader line -- anchor from the dot in the panel
  var pp=mp(pt.la,pt.ln);
  var px=+pp[0], py=+pp[1];
  var idx=ALL_POINTS.indexOf(pt);
  var panelW=118, panelLeftX=MW-panelW-4;
  var anchorX=panelLeftX+10;       // dot center x
  var anchorY=4+10+idx*20+5;       // dot center y: panelY+10+i*20+5
  ln.setAttribute('d','M'+anchorX+','+anchorY+' C'+(anchorX-50)+','+anchorY+' '+(px+50)+','+py+' '+px+','+py);
  ln.setAttribute('stroke', pt.col);
  ol.setAttribute('opacity','1');

  // Pulse marker
  var mk=document.getElementById('mk-'+pt.id);
  if(mk){ mk.style.filter='drop-shadow(0 0 10px '+pt.col+')'; }
  setTimeout(function(){
    var m=document.getElementById('mk-'+pt.id);
    if(m) m.style.filter='';
  },1400);

  // Show info box
  if(infoBox){
    var desc=PT_DESC[id]||pt.sub;
    infoBox.style.display='block';
    infoBox.innerHTML=
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">'+
        '<div style="width:10px;height:10px;border-radius:50%;background:'+pt.col+';flex-shrink:0;box-shadow:0 0 6px '+pt.col+'88;"></div>'+
        '<div style="font-size:15px;color:#f0e6d0;font-weight:400;">'+pt.label+'</div>'+
        '<div style="font-size:10px;color:'+pt.col+';margin-left:auto;font-style:italic;">'+pt.sub+'</div>'+
        '<button onclick="mapClick(\''+id+'\')" style="background:none;border:none;color:#5a4a38;font-size:16px;cursor:pointer;line-height:1;padding:0 0 0 8px;">✕</button>'+
      '</div>'+
      '<div style="font-size:12px;color:#b0a090;line-height:1.65;">'+desc+'</div>';
  }
}

var openStop = null;

function showTab(id){
  lastTab = id;
  try{ sessionStorage.setItem('al26tab', id); }catch(e){}
  document.querySelectorAll('.tab').forEach(function(t){
    t.classList.toggle('active', t.getAttribute('onclick')==="showTab('"+id+"')");
  });
  var c=document.getElementById('ct');
  c.scrollTop=0;
  var html='';
  if(id==='route')     html=renderRoute();
  else if(id==='today')    html=renderToday();
  else if(id==='stops')    html=renderStops();
  else if(id==='dist')     html=renderDist();
  else if(id==='acc')      html=renderAcc();
  else if(id==='wx')       html=renderWx();
  else if(id==='map')      html=buildMap();
  else if(id==='markets')  html=renderMarkets();
  else if(id==='language') html=renderLanguage();
  else if(id==='exchange') html=renderExchange();
  else if(id==='expenses') html=renderExpenses();
  else if(id==='checklist')html=renderChecklist();
  else if(id==='tips')     html=renderTips();
  c.innerHTML=html;
  if(id==='exchange') setTimeout(fetchRate,100);
  if(id==='map' && mapActiveId){ var sid=mapActiveId; mapActiveId=null; mapClick(sid); }
}

function toggleStop(id){
  openStop = openStop===id ? null : id;
  showTab('stops');
  // Scroll to the opened card
  setTimeout(function(){
    var el=document.getElementById('stop-'+id);
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },50);
}

// Checklist toggle and progress — state managed in INIT section above

function clToggle(id){
  clState[id] = !clState[id];
  clSave();
  var box=document.getElementById('cl-'+id);
  var row=document.getElementById('clr-'+id);
  if(box) box.textContent = clState[id] ? '✓' : '';
  if(row){
    row.style.opacity = clState[id] ? '0.45' : '1';
    row.style.textDecoration = clState[id] ? 'line-through' : 'none';
  }
  updateClProgress();
}

function updateClProgress(){
  var total=0, done=0;
  CHECKLIST.forEach(function(cat){
    cat.items.forEach(function(item,i){
      var id=cat.cat+'-'+i;
      total++;
      if(clState[id]) done++;
    });
  });
  var pct=total>0?Math.round(done/total*100):0;
  var bar=document.getElementById('cl-bar');
  var lbl=document.getElementById('cl-lbl');
  if(bar) bar.style.width=pct+'%';
  if(lbl) lbl.textContent=done+' / '+total+' erledigt ('+pct+'%)';
}

function clReset(){
  if(!confirm('Alle Häkchen zurücksetzen?')) return;
  clState={};
  clSave();
  showTab('checklist');
}

function renderChecklist(){
  var totalAll=0, doneAll=0;
  CHECKLIST.forEach(function(cat){
    cat.items.forEach(function(_,i){ totalAll++; if(clState[cat.cat+'-'+i]) doneAll++; });
  });
  var pctAll=totalAll>0?Math.round(doneAll/totalAll*100):0;

  var h=
    // Progress header
    '<div class="card" style="margin-bottom:14px;">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'+
        '<div>'+

        '</div>'+
        '<button onclick="clReset()" style="background:rgba(224,112,80,0.1);border:1px solid rgba(224,112,80,0.3);color:#e07050;padding:6px 12px;border-radius:8px;font-size:11px;font-family:Georgia,serif;cursor:pointer;">↺ Reset</button>'+

      '</div>'+
    '</div>';

  CHECKLIST.forEach(function(cat){
    var catTotal=cat.items.length;

    h+='<div class="card" style="margin-bottom:10px;padding:0;overflow:hidden;">'+

var fxRate = null;

function fetchRate(){
  var disp=document.getElementById('fx-display');
  if(disp) disp.innerHTML='<div style="font-size:11px;color:var(--m);">Lade...</div>';
  // Use exchangerate-api (free, no key needed for basic)
  fetch('https://api.exchangerate-api.com/v4/latest/EUR')
    .then(function(r){return r.json();})
    .then(function(data){
      fxRate = data.rates && data.rates.ALL;
      if(!fxRate) throw new Error('Rate not found');
      var date = data.date || new Date().toISOString().slice(0,10);
      var disp2=document.getElementById('fx-display');
      if(disp2){
        disp2.innerHTML=
          '<div style="font-size:36px;color:var(--gold);font-weight:300;line-height:1;">1 EUR = <span style="color:#f0e6d0;">'+fxRate.toFixed(1)+'</span> LEK</div>'+
          '<div style="font-size:10px;color:var(--m);margin-top:6px;">Stand: '+date+' · 100 LEK ~ '+(100/fxRate).toFixed(2)+'€</div>'+
          '<div style="font-size:11px;color:#6BAF8C;margin-top:4px;">Geldwechsel: Besten Kurs in Wechselstuben in Tirana finden</div>';
      }
      var calc=document.getElementById('fx-calc');
      if(calc) calc.style.display='block';
      calcLek();
    })
    .catch(function(){
      // Fallback to approximate fixed rate if API fails
      fxRate = 98.5;
      var disp3=document.getElementById('fx-display');
      if(disp3){
        disp3.innerHTML=
          '<div style="font-size:32px;color:var(--gold);font-weight:300;">1 EUR ~ <span style="color:#f0e6d0;">98-100</span> LEK</div>'+
          '<div style="font-size:10px;color:#e07050;margin-top:6px;">⚠ Kein Internet -- Richtwert (Stand 2025)</div>'+
          '<div style="font-size:11px;color:var(--m);margin-top:4px;">Aktuellen Kurs im Wechselbüro erfragen</div>';
      }
      var calc2=document.getElementById('fx-calc');
      if(calc2) calc2.style.display='block';
      calcLek();
    });
}

function calcLek(){
  if(!fxRate) return;
  var inp=document.getElementById('fx-eur');
  var res=document.getElementById('fx-result');
  if(!inp||!res) return;
  var eur=parseFloat(inp.value)||0;
  res.textContent=Math.round(eur*fxRate).toLocaleString('de-DE');
}

function addExpense(){
  var date=document.getElementById('exp-date').value;
  var cat=document.getElementById('exp-cat').value;
  var amt=parseFloat(document.getElementById('exp-amt').value);
  var desc=document.getElementById('exp-desc').value.trim();
  var note=document.getElementById('exp-note').value.trim();
  var loc=document.getElementById('exp-loc').value.trim();
  if(!date||!amt||amt<=0) return;
  if(!expenses[date]) expenses[date]=[];
  expenses[date].push({cat:cat, amt:amt, desc:desc||cat, note:note, loc:loc, id:Date.now()});
  expSave();
  document.getElementById('exp-amt').value='';
  document.getElementById('exp-desc').value='';
  document.getElementById('exp-note').value='';
  document.getElementById('exp-loc').value='';
  renderExpenseList();
  updateExpenseSummary();
}

function delExpense(date, id){
  if(!expenses[date]) return;
  expenses[date]=expenses[date].filter(function(e){return e.id!==id;});
  expSave();
  renderExpenseList();
  updateExpenseSummary();
}

  var grandTotal=0, byDay={}, byCat={};
  EXPENSE_CATS.forEach(function(c){byCat[c]=0;});
  Object.keys(expenses).forEach(function(date){
    var dayTotal=0;
    (expenses[date]||[]).forEach(function(e){
      grandTotal+=e.amt; dayTotal+=e.amt;
      byCat[e.cat]=(byCat[e.cat]||0)+e.amt;
    });

  var days=Object.keys(byDay).length||1;

    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">'+
    [
      {v:grandTotal.toFixed(0)+'€', l:'Gesamt'},
      {v:(grandTotal/2).toFixed(0)+'€', l:'Pro Person'},
      {v:(grandTotal/days).toFixed(0)+'€', l:'Pro Tag'},
    ].map(function(s){return '<div class="sb"><div class="sv">'+s.v+'</div><div class="sl">'+s.l+'</div></div>';}).join('')+
    '</div>'+
    '<div style="font-size:10px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;">Nach Kategorie</div>'+
    EXPENSE_CATS.map(function(cat){
      var amt=byCat[cat]||0;
      var pct=grandTotal>0?Math.round(amt/grandTotal*100):0;
      return amt>0?'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">'+
        '<span style="font-size:11px;min-width:20px;">'+cat.split(' ')[0]+'</span>'+

          '<div style="height:100%;background:var(--gold);border-radius:3px;width:'+pct+'%;"></div></div>'+
        '<span style="font-size:11px;color:var(--m);min-width:50px;text-align:right;">'+amt.toFixed(0)+'€ ('+pct+'%)</span>'+
      '</div>':'';
    }).join('');
}

function renderExpenses(){
  var today=new Date().toISOString().slice(0,10);
  var inTrip=TRIP_DAYS.includes(today);
  var defDate=inTrip?today:TRIP_DAYS[0];
  var inputStyle='background:rgba(255,255,255,0.05);border:1px solid var(--gb);border-radius:8px;padding:9px;font-size:13px;color:#f0e6d0;font-family:Georgia,serif;outline:none;width:100%;';
  var h=
    '<div style="font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;">Ausgaben-Tracker</div>'+
    '<div class="card" style="margin-bottom:12px;">'+
      '<div class="lbl lg">Ausgabe hinzufügen</div>'+
      // Row 1: Date + Category
      '<div style="display:flex;gap:8px;margin-bottom:8px;">'+
        '<input id="exp-date" type="date" value="'+defDate+'" min="'+TRIP_DAYS[0]+'" max="'+TRIP_DAYS[TRIP_DAYS.length-1]+'" onchange="renderExpenseList()" '+
          'style="flex:1;'+inputStyle+'"/>'+
        '<select id="exp-cat" style="flex:1;background:#1a1208;border:1px solid var(--gb);border-radius:8px;padding:9px;font-size:12px;color:#f0e6d0;font-family:Georgia,serif;outline:none;">'+
          EXPENSE_CATS.map(function(c){return '<option>'+c+'</option>';}).join('')+
        '</select>'+
      '</div>'+
      // Row 2: Amount + Description
      '<div style="display:flex;gap:8px;margin-bottom:8px;">'+
        '<input id="exp-amt" type="number" placeholder="Betrag €" step="0.01" min="0" '+
          'style="flex:1;min-width:90px;background:rgba(255,255,255,0.05);border:1px solid var(--gb);border-radius:8px;padding:9px;font-size:15px;color:#f0e6d0;font-family:Georgia,serif;outline:none;" '+
          'onkeydown="if(event.key===\'Enter\')document.getElementById(\'exp-loc\').focus()"/>'+
        '<input id="exp-desc" type="text" placeholder="Bezeichnung (z.B. Mittagessen)" '+
          'style="flex:2;min-width:120px;background:rgba(255,255,255,0.05);border:1px solid var(--gb);border-radius:8px;padding:9px;font-size:13px;color:#f0e6d0;font-family:Georgia,serif;outline:none;" '+
          'onkeydown="if(event.key===\'Enter\')document.getElementById(\'exp-loc\').focus()"/>'+
      '</div>'+
      // Row 3: Location
      '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">'+
        '<span style="font-size:14px;flex-shrink:0;">📍</span>'+
        '<input id="exp-loc" type="text" placeholder="Ort (z.B. Restaurant Tymi, Saranda Promenade)" '+
          'style="flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--gb);border-radius:8px;padding:9px;font-size:12px;color:#f0e6d0;font-family:Georgia,serif;outline:none;" '+
          'onkeydown="if(event.key===\'Enter\')document.getElementById(\'exp-note\').focus()"/>'+
      '</div>'+
      // Row 4: Note + Add button
      '<div style="display:flex;gap:8px;align-items:center;">'+
        '<span style="font-size:14px;flex-shrink:0;">📝</span>'+
        '<input id="exp-note" type="text" placeholder="Notiz (z.B. sehr gut, nochmal hingehen!)" '+
          'style="flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--gb);border-radius:8px;padding:9px;font-size:12px;color:#f0e6d0;font-family:Georgia,serif;outline:none;" '+
          'onkeydown="if(event.key===\'Enter\')addExpense()"/>'+
        '<button onclick="addExpense()" style="background:var(--gold);color:#0a0a0a;border:none;border-radius:8px;padding:10px 20px;font-size:15px;font-family:Georgia,serif;cursor:pointer;flex-shrink:0;">+</button>'+
      '</div>'+
      '<div style="font-size:9px;color:var(--s);margin-top:8px;font-style:italic;">Enter springt zum nächsten Feld · letztes Enter speichert</div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:12px;">'+
      '<div class="lbl lg">Ausgaben des Tages</div>'+
      '<div id="exp-list"></div>'+
    '</div>'+
    '<div class="card card-green">'+
      '<div class="lbl lgn">Gesamtübersicht</div>'+
      '<div id="exp-summary"></div>'+
    '</div>';

  setTimeout(function(){
    renderExpenseList();
    updateExpenseSummary();
  }, 50);
  return h;
}

// ── PERSISTENZ — localStorage für alles Wichtige ─────────────────────────────
// Packliste: sessionStorage → localStorage (dauerhaft)
var clState = {};
(function(){
  try{
    // Erst localStorage versuchen (dauerhaft), dann sessionStorage (Legacy)
    var s=localStorage.getItem('al26cl')||sessionStorage.getItem('al26cl');
    if(s) clState=JSON.parse(s);
  }catch(e){}
})();
function clSave(){
  try{
    localStorage.setItem('al26cl', JSON.stringify(clState));
    sessionStorage.setItem('al26cl', JSON.stringify(clState));
  }catch(e){}
}

// Tab-State: letzten aktiven Tab merken
var lastTab = 'route';
(function(){
  try{ var t=sessionStorage.getItem('al26tab'); if(t) lastTab=t; }catch(e){}
})();

// ── INIT ─────────────────────────────────────────────────────────────────────
showTab(lastTab);
</script>
